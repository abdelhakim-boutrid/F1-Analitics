<svg width="420" height="200" viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .card-title { font-family: 'Bebas Neue', 'Arial Black', sans-serif; font-size: 26px; fill: #f5f5f0; letter-spacing: 2px; }
      .card-body  { font-family: 'Space Mono', monospace; font-size: 11px; fill: #777; line-height: 1.6; }
      .card-tag   { font-family: 'Space Mono', monospace; font-size: 10px; fill: #1a1a1a; font-weight: 700; }
      .card-num   { font-family: 'Bebas Neue', 'Arial Black', sans-serif; font-size: 48px; fill: #E8002D; opacity: 0.12; }
    </style>
  </defs>

  <!-- card bg -->
  <rect width="420" height="200" rx="8" fill="#111111"/>
  <rect width="420" height="200" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- top accent -->
  <rect x="0" y="0" width="420" height="3" rx="1" fill="#E8002D"/>

  <!-- big ghost number -->
  <text class="card-num" x="310" y="148">01</text>

  <!-- icon area -->
  <rect x="24" y="28" width="36" height="36" rx="6" fill="#1a1a1a"/>
  <!-- simple F1 car icon (minimal) -->
  <rect x="31" y="43" width="22" height="7" rx="3" fill="#E8002D"/>
  <rect x="28" y="47" width="5"  height="4" rx="2" fill="#555"/>
  <rect x="51" y="47" width="5"  height="4" rx="2" fill="#555"/>
  <rect x="37" y="41" width="8"  height="4" rx="2" fill="#888"/>

  <!-- title -->
  <text class="card-title" x="70" y="52">F1 DASHBOARD</text>

  <!-- divider -->
  <line x1="24" y1="76" x2="396" y2="76" stroke="#222" stroke-width="1"/>

  <!-- description lines -->
  <text class="card-body" x="24" y="96">Visualisation des statistiques de la Formule 1.</text>
  <text class="card-body" x="24" y="112">Victoires · Championnats · Comparaisons</text>
  <text class="card-body" x="24" y="128">entre pilotes depuis 1950.</text>

  <!-- tech tags -->
  <rect x="24"  y="148" width="52" height="20" rx="4" fill="#E8002D"/>
  <text class="card-tag" x="50"  y="162" text-anchor="middle">Python</text>

  <rect x="84"  y="148" width="52" height="20" rx="4" fill="#222"/>
  <text class="card-tag" x="110" y="162" text-anchor="middle" fill="#888">React</text>

  <rect x="144" y="148" width="56" height="20" rx="4" fill="#222"/>
  <text class="card-tag" x="172" y="162" text-anchor="middle" fill="#888">Chart.js</text>

  <!-- bottom meta -->
  <line x1="24" y1="178" x2="396" y2="178" stroke="#1e1e1e" stroke-width="1"/>
  <text class="card-body" x="24"  y="192">⭐  FORMULA 1 DATA</text>
  <text class="card-body" x="320" y="192">2024 – 2025</text>
</svg>
